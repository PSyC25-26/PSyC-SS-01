spring.application.name=ubesto
server.port=8080

#H2 database configuration
spring.datasource.url=jdbc:h2:file:./PSyC-SS-01/data/db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=db-user
spring.datasource.password=db-password
spring.sql.init.platform=h2

# Enable H2 console in the browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Esta línea es clave si usas Spring Security (por si acaso)
spring.h2.console.settings.web-allow-others=true

# Auto-generate the database schema based on the entities
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false